name: Daily Activity
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update log
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') - Daily pulse" >> update.log
      - name: Commit and push
        run: |
          git config user.name "Hermes-Self"
          git config user.email "hermes@isamesih3.com"
          git add update.log
          git diff --cached --quiet || git commit -m "pulse: $(date -u '+%Y-%m-%d')"
          git push
